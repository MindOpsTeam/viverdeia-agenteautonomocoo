document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
{"pages":{"Atlas.dc":"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"c127b7b3-5c30-4461-81b5-c5a0bac1c43d\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"theme-color\" content=\"#02162A\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-title\" content=\"Atlas\">\n<link rel=\"apple-touch-icon\" href=\"9017c8c8-0267-4471-bbef-a41b84f52c33\">\n<style>/* ============================================================\n   Viver de IA — Webfonts\n   Geist (sans) + Geist Mono, variable weight 100–900.\n   Italic axis shipped as separate variable files.\n   ============================================================ */\n\n@font-face {\n  font-family: \"Geist\";\n  src: url(\"dc757a6e-c7a8-4947-bf45-a4d6c0568365\") format(\"woff2-variations\");\n  font-weight: 100 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Geist\";\n  src: url(\"11843505-6637-4b70-b100-4a6448f0a2fb\") format(\"woff2-variations\");\n  font-weight: 100 900;\n  font-style: italic;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Geist Mono\";\n  src: url(\"f2d50ba0-8738-4527-a4b5-b4c48877cf2d\") format(\"woff2-variations\");\n  font-weight: 100 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Geist Mono\";\n  src: url(\"72b39f98-e1da-49b4-8bb3-ce217e0d274e\") format(\"woff2-variations\");\n  font-weight: 100 900;\n  font-style: italic;\n  font-display: swap;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Viver de IA — Color tokens\n   White-first, complete dark mode. Navy / white / gray.\n   Coral (#FF4D4D) is reserved for destructive actions only.\n   ============================================================ */\n\n:root {\n  /* ---- Brand navy scale (core = #02162A, sampled from the app icon) ---- */\n */\n  --text-strong:  var(--navy-950);\n  --text-body:    var(--gray-800);\n  --text-muted:   var(--gray-500);\n  --text-subtle:  var(--gray-400);\n  --text-inverse: var(--white);\n  --text-link:    var(--navy-700);\n\n  /* Primary action (brand) */\n  --accent:        var(--navy-950);\n  --accent-hover:  var(--navy-800);\n  --accent-active: var(--navy-900);\n  --accent-fg:     var(--white);\n  --accent-subtle: var(--navy-50);\n\n  /* Status: text / bg / border triplets */\n  --danger:        var(--coral-500);\n  --danger-hover:  var(--coral-600);\n  --danger-fg:     var(--white);\n  --danger-bg:     var(--coral-50);\n  --danger-border: var(--coral-100);\n\n  --success:        var(--green-500);\n  --success-fg:     var(--white);\n  --success-bg:     var(--green-50);\n  --success-border: var(--green-100);\n\n  --warning:        var(--amber-500);\n  --warning-fg:     var(--navy-950);\n  --warning-bg:     var(--amber-50);\n  --warning-border: var(--amber-100);\n\n  --info:        var(--azure-500);\n  --info-fg:     var(--white);\n  --info-bg:     var(--azure-50);\n  --info-border: var(--azure-100);\n\n  /* Focus */\n  --focus-ring: var(--navy-500);\n\n  color-scheme: light;\n}\n\n/* ============================================================\n   SEMANTIC ALIASES — dark mode\n   Navy becomes the canvas; primary action flips to white.\n   ============================================================ */\n[data-theme=\"dark\"] {\n  --bg-base:    var(--navy-950);\n  --bg-subtle:  #051d33;\n  --bg-muted:   #082743;\n  --bg-inverse: var(--white);\n\n  --surface-card:    #06243e;\n  --surface-raised:  #0a2c4a;\n  --surface-inset:   #04203a;\n  --surface-overlay: rgba(0, 6, 14, 0.6);\n\n  --border-subtle:  rgba(255, 255, 255, 0.08);\n  --border-default: rgba(255, 255, 255, 0.14);\n  --border-strong:  rgba(255, 255, 255, 0.26);\n\n  --text-strong:  var(--white);\n  --text-body:    #d5dee8;\n  --text-muted:   #8a99ab;\n  --text-subtle:  #5e6e80;\n  --text-inverse: var(--navy-950) "margin:0;font-size:29px;font-weight:600;letter-spacing:-0.022em;line-height:1.12;color:var(--text-strong);\">Boa tarde, Rafael.<\u002Fh1>\n                <p style=\"margin:5px 0 0;font-size:15px;color:var(--text-muted);letter-spacing:-0.006em;\">Aqui está o que importa agora — já cuidei do resto.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- suggestion cards -->\n            <div style=\"display:flex;flex-direction:column;gap:12px;\">\n              <sc-for list=\"{{ suggestions }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:14px;box-shadow:var(--shadow-sm);padding:16px 16px 14px;display:flex;gap:13px;animation:atlasUp 0.45s var(--ease-out) both;\">\n                  <div style=\"width:38px;height:38px;border-radius:10px;background:{{ s.iconBg }};color:{{ s.iconFg }};display:flex;align-items:center;justify-content:center;flex:none;\">\n                    <i data-lucide=\"{{ s.icon }}\" style=\"width:19px;height:19px;stroke-width:1.9;\"><\u002Fi>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"display:flex;align-items:flex-start;gap:10px;\">\n                      <p style=\"margin:0;flex:1;font-size:14.5px;font-weight:500;line-height:1.45;color:var(--text-strong);letter-spacing:-0.006em;text-wrap:pretty;\">{{ s.text }}<\u002Fp>\n                      <span style=\"font-family:var(--font-mono);font-size:10.5px;color:var(--text-subtle);white-space:nowrap;padding-top:2px;\">{{ s.time }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"margin:4px 0 0;font-size:12.5px;color:var(--text-muted);line-height:1.4;\">{{ s.context }}<\u002Fp>\n                    <div style=\"display:flex;gap:8px;margin-top:13px;\">\n                      <button onclick=\"{{ s.onPrimary }}\" style=\"height:32px;padding:0 14px;border-radius:8px;border e=\"flex:1;\"><\u002Fspan>\n                  <span style=\"font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);\">{{ procSuggestion.basis }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- consult note -->\n              <div style=\"margin-top:16px;display:flex;align-items:flex-start;gap:10px;padding:13px 15px;border-radius:11px;background:var(--surface-inset);border:1px solid var(--border-subtle);\">\n                <i data-lucide=\"message-circle\" style=\"width:16px;height:16px;color:var(--text-muted);flex:none;margin-top:1px;stroke-width:1.75;\"><\u002Fi>\n                <div><div style=\"font-size:12.5px;font-weight:600;color:var(--text-strong);margin-bottom:2px;\">Consultar pelo Discord ou Slack<\u002Fdiv><p style=\"margin:0;font-size:12px;color:var(--text-muted);line-height:1.5;\">Membros com acesso podem perguntar <span style=\"font-family:var(--font-mono);color:var(--text-body);\">“Atlas, qual é o processo de fechamento de contrato?”<\u002Fspan> — ele responde com a versão atual, formatada para o canal.<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- MORE_SCREENS -->\n\n      <\u002Fmain>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ ONBOARDING ============ -->\n  <sc-if value=\"{{ isOnboarding }}\">\n  <div style=\"height:100vh;width:100%;background:var(--bg-base);display:flex;flex-direction:column;overflow:auto;\">\n    <sc-if value=\"{{ onbShowIntro }}\">\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:32px;\">\n      <div style=\"max-width:460px;text-align:center;animation:atlasUp 0.5s var(--ease-out) both;\">\n        <div style=\"width:72px;height:72px;border-radius:18px;margin:0 auto 22px;background:linear-gradient(160deg,#0a4f95,#02162a);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 19 L12 5 L19 19\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M8.5 14 H15.5\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h1 style=\"margin:0;font-size:30px;font-weight:600;letter-spacing:-0.022em;color:var(--text-strong);\">Olá, Rafael. Sou o Atlas.<\u002Fh1>\n        <p style=\"margin:14px auto 0;max-width:400px;font-size:15px;color:var(--text-muted);line-height:1.6;\">Vou operar sua empresa junto com você — executar, monitorar e cobrar o que precisar. Antes de começar, preciso de algumas informações.<\u002Fp>\n        <button onclick=\"{{ onbCtaClick }}\" style=\"margin-top:26px;height:46px;padding:0 26px;border-radius:10px;border:none;background:var(--accent);color:var(--accent-fg);font-family:var(--font-sans);font-size:15px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:9px;\" style-hover=\"background:var(--accent-hover);\">Vamos lá <i data-lucide=\"arrow-right\" style=\"width:18px;height:18px;stroke-width:2.1;\"><\u002Fi><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ onbShowSteps }}\">\n    <div style=\"flex:1;display:flex;flex-direction:column;max-width:680px;width:100%;margin:0 auto;padding:28px 26px;\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:30px;\">\n        <div style=\"width:30px;height:30px;border-radius:8px;background:linear-gradient(160deg,#0a4f95,#02162a);display:flex;align-items:center;justify-content:center;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 19 L12 5 L19 19\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <span style=\"font-size:14px;font-weight:600;color:var(--text-strong);\">Configuração do Atlas<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:34px;\">\n        <sc-for list=\"{{ onbStepsView }}\" as=\"s\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;\">\n            <div style=\"width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:{{ s.bg }};color:{{ s.fg }};border:1px solid {{ s.bd }};\"><i data-lucide=\"{{ s.icon }}\" style=\"width:17px;height:17px;stroke-width:2;\"><\u002Fi><\u002Fdiv>\n            <span style=\"font-size:11.5px;font-weight:500;color:{{ s.labelColor }};text-align:center;\">{{ s.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:14px;box-shadow:var(--shadow-sm);padding:30px 28px;display:flex;flex-direction:column;\">\n        <div style=\"width:48px;height:48px;border-radius:12px;background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;color:var(--text-link);margin-bottom:16px;\"><i data-lucide=\"{{ onbCurIcon }}\" style=\"width:24px;height:24px;stroke-width:1.6;\"><\u002Fi><\u002Fdiv>\n        <h2 style=\"margin:0;font-size:21px;font-weight:600;letter-spacing:-0.014em;color:var(--text-strong);\">{{ onbCurrent.title }}<\u002Fh2>\n        <p style=\"margin:9px 0 22px;font-size:14px;color:var(--text-muted);line-height:1.6;max-width:480px;text-wrap:pretty;\">{{ onbCurrent.desc }}<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:10px;background:var(--surface-inset);border:1px dashed var(--border-default);border-radius:10px;padding:16px;color:var(--text-subtle);font-size:13px;\"><i data-lucide=\"settings-2\" style=\"width:17px;height:17px;stroke-width:1.6;\"><\u002Fi>Formulário desta etapa aparece aqui no produto.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:22px;\">\n        <button onclick=\"{{ onbPrev }}\" style=\"height:42px;padding:0 18px;border-radius:9px;border:1px solid var(--border-default);background:var(--surface-card);color:var(--text-strong);font-family:var(--font-sans);font-size:14px;font-weight:500;cursor:pointer;display:{{ onbCanBack ? 'inline-flex' : 'none' }};align-items:center;gap:7px;\"><i data-lucide=\"arrow-left\" style=\"width:16px;height:16px;stroke-width:2;\"><\u002Fi>Voltar<\u002Fbutton>\n        <div style=\"flex:1;\"><\u002Fdiv>\n        <button onclick=\"{{ onbCtaClick }}\" style=\"height:42px;padding:0 22px;border-radius:9px;border:none;background:var(--accent);color:var(--accent-fg);font-family:var(--font-sans);font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:8px;\" style-hover=\"background:var(--accent-hover);\">{{ onbCta }} <i data-lucide=\"arrow-right\" style=\"width:16px;height:16px;stroke-width:2.1;\"><\u002Fi><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ MOBILE / PWA ============ -->\n  <sc-if value=\"{{ isMobile }}\">\n  <div style=\"height:100vh;width:100%;background:var(--bg-subtle);display:flex;flex-direction:column;overflow:auto;\">\n    <header style=\"height:56px;flex:none;display:flex;align-items:center;gap:12px;padding:0 22px;background:var(--bg-base);border-bottom:1px solid var(--border-subtle);\">\n      <button onclick=\"{{ goBack }}\" style=\"display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 12px;border-radius:8px;border:1px solid var(--border-subtle);background:var(--surface-card);color:var(--text-strong);font-family:var(--font-sans);font-size:13px;font-weight:500;cursor:pointer;\"><i data-lucide=\"arrow-left\" style=\"width:15px;height:15px;stroke-width:2;\"><\u002Fi>Voltar ao painel<\u002Fbutton>\n      <div style=\"display:flex;flex-direction:column;line-height:1.15;\"><span style=\"font-size:14px;font-weight:600;color:var(--text-strong);\">Atlas no celular<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-subtle);\">PWA · adicionar à tela inicial<\u002Fspan><\u002Fdiv>\n    <\u002Fheader>\n    <div style=\"flex:1;display:flex;align-items:flex-start;justify-content:center;gap:44px;flex-wrap:wrap;padding:38px 24px;\">\n\n      <!-- PHONE 1: ENTRADA -->\n      <div style=\"width:300px;flex:none;\">\n        <div style=\"font-size:12px;font-weight:600;color:var(--text-muted);text-align:center;margin-bottom:12px;\">Tela de entrada<\u002Fdiv>\n        <div style=\"width:300px;height:620px;border-radius:42px;background:#02162a;padding:11px;box-shadow:var(--shadow-lg);\">\n          <div style=\"width:100%;height:100%;border-radius:32px;background:var(--bg-base);overflow:hidden;display:flex;flex-direction:column;position:relative;\">\n            <div style=\"height:34px;flex:none;background:#02162a;display:flex;align-items:center;justify-content:space-between;padding:0 18px;\"><span style=\"font-family:var(--font-mono);font-size:11px;font-weight:600;color:#fff;\">14:32<\u002Fspan><span style=\"display:flex;gap:5px;align-items:center;color:#fff;\"><i data-lucide=\"signal\" style=\"width:13px;height:13px;\"><\u002Fi><i data-lucide=\"wifi\" style=\"width:13px;height:13px;\"><\u002Fi><i data-lucide=\"battery-full\" style=\"width:15px;height:15px;\"><\u002Fi><\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1;overflow:hidden;padding:16px 15px 0;\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:14px;\"><div style=\"width:30px;height:30px;border-radius:8px;background:linear-gradient(160deg,#0a4f95,#02162a);display:flex;align-items:center;justify-content:center;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 19 L12 5 L19 19\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"flex:1;\"><div style=\"font-size:13px;font-weight:600;color:var(--text-strong);\">Boa tarde, Rafael<\u002Fdiv><div style=\"font-size:10.5px;color:var(--green-600);display:flex;align-items:center;gap:4px;\"><span style=\"width:5px;height:5px;border-radius:50%;background:#1f9d6b;\"><\u002Fspan>Atlas online<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:12px;box-shadow:var(--shadow-xs);padding:11px;margin-bottom:9px;\"><div style=\"display:flex;gap:8px;\"><div style=\"width:28px;height:28px;border-radius:8px;background:var(--warning-bg);color:var(--amber-600);display:flex;align-items:center;justify-content:center;flex:none;\"><i data-lucide=\"clock\" style=\"width:15px;height:15px;\"><\u002Fi><\u002Fdiv><p style=\"margin:0;font-size:11.5px;font-weight:500;color:var(--text-strong);line-height:1.4;\">2 tarefas de SLA vencem amanhã. Aciono o time?<\u002Fp><\u002Fdiv><div style=\"display:flex;gap:6px;margin-top:9px;\"><span style=\"flex:1;text-align:center;padding:6px;border-radius:7px;background:var(--accent);color:var(--accent-fg);font-size:11px;font-weight:500;\">Acionar<\u002Fspan><span style=\"flex:1;text-align:center;padding:6px;border-radius:7px;border:1px solid var(--border-default);font-size:11px;font-weight:500;color:var(--text-strong);\">Revisar<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:12px;box-shadow:var(--shadow-xs);padding:11px;margin-bottom:9px;\"><div style=\"display:flex;gap:8px;\"><div style=\"width:28px;height:28px;border-radius:8px;background:var(--info-bg);color:var(--azure-600);display:flex;align-items:center;justify-content:center;flex:none;\"><i data-lucide=\"file-text\" style=\"width:15px;height:15px;\"><\u002Fi><\u002Fdiv><p style=\"margin:0;font-size:11.5px;font-weight:500;color:var(--text-strong);line-height:1.4;\">Relatório semanal pronto. Posto no #operações?<\u002Fp><\u002Fdiv><\u002Fdiv>\n              <div style=\"background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:12px;box-shadow:var(--shadow-xs);padding:11px;\"><div style=\"display:flex;gap:8px;\"><div style=\"width:28px;height:28px;border-radius:8px;background:var(--accent-subtle);color:var(--text-link);display:flex;align-items:center;justify-content:center;flex:none;\"><i data-lucide=\"user-round\" style=\"width:15px;height:15px;\"><\u002Fi><\u002Fdiv><p style=\"margin:0;font-size:11.5px;font-weight:500;color:var(--text-strong);line-height:1.4;\">Bruno parou a proposta há 3 dias. Cobro?<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:none;padding:9px 13px;border-top:1px solid var(--border-subtle);background:var(--bg-base);\"><div style=\"display:flex;align-items:center;gap:8px;background:var(--surface-inset);border:1px solid var(--border-subtle);border-radius:999px;padding:7px 7px 7px 13px;\"><span style=\"flex:1;font-size:11.5px;color:var(--text-subtle);\">Fale com o Atlas…<\u002Fspan><span style=\"width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;\"><i data-lucide=\"arrow-up\" style=\"width:14px;height:14px;color:var(--accent-fg);stroke-width:2.2;\"><\u002Fi><\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:none;height:54px;display:flex;align-items:center;justify-content:space-around;border-top:1px solid var(--border-subtle);background:var(--bg-base);padding-bottom:6px;\">\n              <span style=\"display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--accent);\"><i data-lucide=\"home\" style=\"width:18px;height:18px;stroke-width:2;\"><\u002Fi><span style=\"font-size:8.5px;font-weight:600;\">Home<\u002Fspan><\u002Fspan>\n              <span sty
